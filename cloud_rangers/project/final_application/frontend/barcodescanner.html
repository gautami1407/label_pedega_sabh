<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - Label Padegha Sabh</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .scanner-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            text-align: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            border: 2px solid #10b981;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 50%;
            border: 2px solid #10b981;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            text-decoration: none;
        }

        .manual-search-box {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .manual-search-box input {
            flex-grow: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }

        .manual-search-box button {
            background: var(--primary-emerald);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <a href="dashboard.html" class="back-btn">
        <i class="bi bi-arrow-left"></i>
    </a>

    <div class="scanner-container">
        <h2 style="margin-bottom: 8px;">Scan Barcode</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 24px;">Align the barcode within the frame to scan
            automatically</p>

        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
            <div class="scan-overlay">
                <div class="scan-line"></div>
            </div>
        </div>

        <div id="status" style="margin-bottom: 20px; font-weight: 500;">
            <i class="bi bi-broadcast"></i> Initializing camera...
        </div>

        <div class="manual-search-box">
            <input type="text" id="manual-barcode" placeholder="Enter barcode manually...">
            <button onclick="manualSearch()">Search</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const videoElement = document.getElementById('video');
        const statusElement = document.getElementById('status');

        async function startScanner() {
            try {
                const videoInputDevices = await codeReader.listVideoInputDevices();
                const deviceId = videoInputDevices[0]?.deviceId;

                if (!deviceId) {
                    statusElement.innerHTML = "<i class='bi bi-exclamation-triangle'></i> No camera found";
                    return;
                }

                statusElement.innerHTML = "<i class='bi bi-camera'></i> Camera Active: Scanning...";

                codeReader.decodeFromVideoDevice(deviceId, videoElement, (result, err) => {
                    if (result) {
                        handleScan(result.text);
                    }
                });
            } catch (err) {
                console.error(err);
                statusElement.innerHTML = "<i class='bi bi-x-circle'></i> Error: " + err.message;
            }
        }

        function handleScan(barcode) {
            statusElement.innerHTML = "<i class='bi bi-check-circle'></i> Scanned: " + barcode;
            localStorage.setItem("scannedBarcode", barcode);
            // In a real app, this would redirect to a product details page
            // For now, let's just go back to the dashboard and highlight the result
            window.location.href = "dashboard.html?barcode=" + barcode;
        }

        function manualSearch() {
            const barcode = document.getElementById('manual-barcode').value.trim();
            if (barcode) {
                handleScan(barcode);
            }
        }

        startScanner();
    </script>
</body>

</html>
