[pytest]
# ════════════════════════════════════════════════════════════════════════════════
# Pytest Configuration for Label Padegha Sabh Backend
# ════════════════════════════════════════════════════════════════════════════════

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test path
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
    slow: Slow running tests
    requires_db: Tests requiring database
    requires_redis: Tests requiring Redis
    requires_mongo: Tests requiring MongoDB

# Output options
addopts =
    -v
    --strict-markers
    --disable-warnings
    -p no:warnings

# Coverage options
# Run with: pytest --cov=lps --cov-report=html
[coverage:run]
source = lps
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
