services:
  postgres:
    image: postgres:16-alpine
    container_name: lps-postgres
    environment:
      POSTGRES_USER: lps
      POSTGRES_PASSWORD: lps_dev_password
      POSTGRES_DB: lps
    ports:
      - "5432:5432"
    volumes:
      - lps_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lps -d lps"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: lps-mongodb
    ports:
      - "27017:27017"
    volumes:
      - lps_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lps-redis
    ports:
      - "6379:6379"
    volumes:
      - lps_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lps-backend
    depends_on:
      - postgres
      - mongodb
      - redis
    environment:
      LPS_SERVER: fastapi
      LPS_HOST: 0.0.0.0
      FASTAPI_PORT: 8000
      DATABASE_URL: postgresql://lps:lps_dev_password@postgres:5432/lps
      MONGODB_URL: mongodb://mongodb:27017/lps
      REDIS_URL: redis://redis:6379/0
      LPS_CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  lps_postgres_data:
  lps_mongo_data:
  lps_redis_data:
